---
deployment:
  tasks:
    - export DEPLOYPATH="$HOME/public_html/cecont"
    - /bin/mkdir -p "$DEPLOYPATH"
    - 'if [ "$DEPLOYPATH" != "$HOME/public_html/cecont" ]; then echo "Deploy path mismatch: $DEPLOYPATH" >&2; exit 1; fi'
    - 'if [ ! -f dist/index.html ]; then echo "dist/index.html not found. Run npm run build locally and commit dist before cPanel deploy." >&2; exit 1; fi'
    - /usr/bin/find "$DEPLOYPATH" -mindepth 1 -maxdepth 1 -exec /bin/rm -rf -- {} +
    - /bin/cp -a dist/. "$DEPLOYPATH"/
